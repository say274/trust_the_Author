<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Be Still</title>

  <!-- Elegant Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
.monogram {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);

  font-size: 0.75rem;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.55);

  font-family: "Cormorant Garamond", serif;
}
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #eaeaea;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;

      font-family: "Cormorant Garamond", serif;
      text-align: center;
    }

    .title {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      max-width: 90vw;
      line-height: 1.4;
      color: #f0f0f0;
    }

    img {
      max-width: 90vw;
      max-height: 70vh;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    button {
      margin-top: 0.5rem;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
      background: transparent;
      color: #ddd;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>

<body>

  <div class="title">
    Dearest Fiona
    
    When your chapter feels too heavy,
    remember to trust the Author.

    Your story is still unfinished.
    .
  </div>
  <div class="monogram">S · H</div>

  <img id="image" alt="A moment of rest" />

  <button onclick="loadRandom()">Another moment</button>

  <script>
    async function loadRandom() {
      const response = await fetch("manifest.json", { cache: "no-store" });
      const images = await response.json();

      const pick = images[Math.floor(Math.random() * images.length)];
      const img = document.getElementById("image");
      img.src = "images/" + pick + "?v=" + Date.now();
    }

    loadRandom();
  </script>

</body>
</html>
