<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Trust the Author</title>
  <link rel="icon" type="image/png" href="favi.png">

<!-- Elegant Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  min-height: 100vh;
  background: #000;
  color: #eaeaea;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;

  font-family: "Cormorant Garamond", serif;
  text-align: center;
  padding: 2rem 1rem;
  box-sizing: border-box;
}

/* message block */

.title {
  font-family: "Playfair Display", serif;
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0.04em;
  max-width: 90vw;
  line-height: 1.4;
  color: #f0f0f0;
}

.title p {
  margin: 0.4em 0;
}

/* smaller lines */

.small-line {
  font-size: clamp(1rem, 2.2vw, 1.3rem);
}

/* main message */

.final-line {
  font-size: clamp(1.6rem, 3vw, 2rem);
  margin-top: 0.9em;
}

/* fade-in effect */

.fade-in {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

img {
  max-width: 90vw;
  max-height: 70vh;
  border-radius: 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

button {
  margin-top: 0.5rem;
  padding: 0.6rem 1.4rem;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  color: #ddd;
  font-family: inherit;
  font-size: 0.9rem;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.08);
}

/* monogram */

.monogram {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.55);
  font-family: "Cormorant Garamond", serif;
}

</style>
</head>

<body>

<div class="title fade-in">

<p class="small-line">Dearest Fiona,</p>

<p class="small-line">When your chapter feels too heavy,</p>

<p class="small-line">remember the One who holds the pen.</p>

<p class="final-line">Your story is still unfinished.</p>

</div>

<div class="monogram">S · H</div>

<img id="image" alt="A moment of rest" />

<button onclick="loadRandom()">Turn the page</button>

<script>

async function loadRandom() {
  const response = await fetch("manifest.json", { cache: "no-store" });
  const images = await response.json();

  const pick = images[Math.floor(Math.random() * images.length)];
  const img = document.getElementById("image");
  img.src = "images/" + pick + "?v=" + Date.now();
}

loadRandom();

</script>

</body>
</html>
